[build]
  # Build the Vite/React frontend from the project root
  base    = "."
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ── Proxy /api/* → your deployed backend (Render, Railway, etc.) ─────────────
# Set VITE_API_URL in Netlify → Site Settings → Environment Variables
# e.g.  VITE_API_URL = https://evote-backend.onrender.com
[[redirects]]
  from   = "/api/*"
  to     = "https://evote-5ssz.onrender.com/api/:splat"
  status = 200
  force  = true

# ── SPA fallback — every unknown path serves index.html ──────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200


