services:
  - type: web
    name: evote-backend
    runtime: node
    rootDir: evote-backend
    buildCommand: npm install && npx prisma generate
    startCommand: node src/app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # set manually in Render dashboard
      - key: DIRECT_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false   # set to your Netlify URL, e.g. https://evote.netlify.app
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: SCHOOL_NAME
        sync: false
      - key: COMMISSION_CODE
        sync: false
